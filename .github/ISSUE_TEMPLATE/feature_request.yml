name: ✨ 功能建议
description: 提一个新功能或改进想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 是什么场景让你觉得现在不够好用？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的方案
      description: 理想中它应该怎么工作？
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 主要涉及
      options:
        - 新增模型预设 / provider 支持
        - 图像生成
        - 视频生成
        - 音频生成
        - WebUI（配置台 / 试用台 / 向导）
        - MCP 工具 / 参数
        - 文档
        - 其它
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 有没有现成的办法可以绕过？为什么不满意？

  - type: input
    id: preset
    attributes:
      label: （如新增 provider）对应的厂商 / 模型 / API 文档链接
      placeholder: "例如：xxx 厂商的 xxx API，文档 https://..."
